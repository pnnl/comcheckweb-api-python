repos:
  - repo: https://github.com/psf/black
    rev: 25.11.0  # latest Black release
    hooks:
      - id: black
        language_version: python3
        exclude: ^src/types/core_types\.py$

  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0  # latest isort release
    hooks:
      - id: isort
        language_version: python3
        exclude: ^src/types/core_types\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        exclude: ^src/types/core_types\.py$
        additional_dependencies: [pydantic>=2.12.4]


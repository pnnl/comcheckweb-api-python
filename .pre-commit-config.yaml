repos:
  - repo: https://github.com/psf/black
    rev: 25.11.0  # latest Black release
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0  # latest isort release
    hooks:
      - id: isort
        language_version: python3.12

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy


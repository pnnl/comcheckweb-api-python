[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "comcheck_api"
version = "0.1.0"
description = "COMcheck Web API Python Client"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27.0",
    "jsonschema>=4.23.0",
    "pydantic>=2.12.5",
    "python-dotenv>=1.0.0",
    "types-jsonschema>=4.23.0",
]

[tool.hatch.build.targets.wheel]
packages = ["comcheck_api"]

[tool.uv.workspace]
members = []

[tool.uv.sources]

[dependency-groups]
dev = [
    "black>=26.1.0",
    "datamodel-code-generator>=0.54.1",
    "pre-commit>=4.5.1",
    "pytest>=9.0.2",
]

[project]
name = "comcheckweb_api"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dotenv>=0.9.9",
    "httpx>=0.28.1",
    "jsonschema>=4.25.1",
    "types-jsonschema>=4.25.1.20251009",
]

[tool.uv.workspace]
members = [
    ".",
]

[tool.uv.sources]
comcheckweb-api-python = { workspace = true }

[tool.mypy]
[[tool.mypy.overrides]]
module = "src.types.core_types"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.constants.*"
ignore_errors = true

[dependency-groups]
dev = [
    "black>=25.11.0",
    "datamodel-code-generator>=0.35.0",
    "mypy>=1.18.2",
    "pre-commit>=4.4.0",
    "pytest>=9.0.1",
]
